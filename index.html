              <div class="step-image" @click="selectedImage = 'assets/step6.webp'">
                <img src="assets/step6.webp" alt="">
                <div class="step-overlay"></div>
                <div class="expand-icon">⛶</div>
              </div>
              <div class="step-text">
                <div class="step-content">
                 Spin the Mega Jackpot Wheel directly on our webpage! Wager your BC and go for the big win! But watch out.... You might land on nothing!
                </div>
              </div>
            </div>
          </div>

          <!-- Section 3: Ranking -->
          <div class="bc-header" style="margin-top: 8rem;">
            <h1 class="bc-title">
              <span class="green">BC</span>
              <span class="white2">Ranking and Rewards</span>
            </h1>
            <div class="bc-desc">
              <p>Check your ranking on the <span class="highlight">BC Ranking</span> page!</p>
              <p class="sub">Compete with your rivals in a fair and friendly battle for the top. Reach the higher ranks and claim your rewards at the end of each season!</p>
            </div>
          </div>

          <div class="steps-container">
            <!-- Step 7 (No Number) -->
            <div class="step-item">
              <div class="step-image" @click="selectedImage = 'assets/step7.webp'">
                <img src="assets/step7.webp" alt="">
                <div class="step-overlay"></div>
                <div class="expand-icon">⛶</div>
              </div>
              <div class="step-text">
                <div class="step-content">
                 You can view your BC Balance on the BC Ranking page in-game.
 <span class="secondary">
(* Different rewards (real items and/or in-game items) will be given at the end of each season depending on your final rank.)<br/>(** Ranking is based on your highest BC balance reached during the season, not the balance you currently hold.)</span>
                </div>
              </div>
            </div>
            <!-- Step 8 (No Number) -->
            <div class="step-item">
              <div class="step-image" @click="selectedImage = 'assets/step8.webp'">
                <img src="assets/step8.webp" alt="">
                <div class="step-overlay"></div>
                <div class="expand-icon">⛶</div>
              </div>
              <div class="step-text">
                <div class="step-content">
                 You can also check your BC Rank directly from our BlackShot website!
                  <span class="secondary">(* Ranking board is updated daily, not in real-time and may not reflect the exact highest amount you have earned.)</span>
                </div>
              </div>
            </div>
          </div>
          <div class="steps-container">
            <div class="step-item last-step">
            <div class="step-image" @click="selectedImage = 'assets/step9.webp'">
                <img src="assets/step9.webp" alt="">
                <div class="step-overlay"></div>
                <div class="expand-icon">⛶</div>
              </div>
              <div class="step-text">
                <div class="step-content">
                  
                  <a href="#" class="ranking-btn">GO TO BC RANKING →</a>
                </div>
              </div>
            </div>
          </div>

          

          <div class="notice-box">
            <div class="notice-content">
              <div class="notice-icon">⚠</div>
              <ul>
                <li class="warning">All BCs will be reset at the end of each season.</li>
                <li>• BC acquisition rates may be different per season.</li>
                <li>• BC Shop will be updated every season.</li>
                <li>• BC Ranking Page is updated once per day.</li>
                 <li>• BC Ranking rewards are subject to change.</li>
              </ul>
            </div>
          </div>
        </section>

        <!-- Image Modal -->
        <transition name="fade">
          <div v-if="selectedImage" class="image-modal" @click="selectedImage = null">
            <div class="image-modal-content" @click.stop>
              <img :src="selectedImage" alt="Enlarged">
              <button class="modal-close-text" @click="selectedImage = null">
                <span>Close</span> ✕
              </button>
            </div>
          </div>
        </transition>

        <!-- Footer -->
        <footer class="footer"></footer>
      </div>
    </div>
    `,
      methods: {
        openVideoModal() {
          this.isVideoOpen = true;
        },
        closeVideoModal() {
          this.isVideoOpen = false;
        }
      }
    });
